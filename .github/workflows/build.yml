on: [push, pull_request]

jobs:
  tests:
    runs-on: ubuntu-latest
    name: Build
    steps:
      - name: "Checkout" 
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Install dependencies"
        run: |
          sudo apt -y update
          sudo apt -y install meson libgtk-3-dev libx11-dev libjansson-dev libluajit-5.1-dev

      - name: "Configure"
        run: meson setup build -Dbuildtype=release

      - name: "Build"
        run: meson compile -C build

      - name: Set Build number
        shell: bash
        run: echo "build_number=$(git rev-list HEAD --count)" >> $GITHUB_ENV

      - name: Compute git short sha
        shell: bash
        run: echo "git_short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: "Bundle extra files"
        run: |
          mkdir release
          cp -r assets release/
          cp -r build/libresplit release/
          cp README.md release/
          cp LICENSE release/

      - name: "Upload artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: LibreSplit-${{ env.build_number }}-${{ env.git_short_sha }}
          path: release/
